<div class="postcard">
    <a href="{% url 'accounts:user_page' post.user.id %}" class="post-user">
    <img src="{{ post.user.profile_image.url }}" class="user-icon" alt="ユーザーアイコン">
    <span class="username">{{ post.user.username }}</span>
    </a>

    {% if login_redirect %}
    <a href="{% url 'accounts:login' %}?next={% url 'posts:post_detail' post.id %}" class="thumbnail-link">
    {% else %}
    <a href="{% url 'posts:post_detail' post.id %}" class="thumbnail-link">
    {% endif %}
        <img class="thumbnail" src="{{ post.thumbnail.url }}" alt="{{ post.title }}">
    </a>

    <div class="post-info">
        {% if login_redirect %}
        <a href="{% url 'accounts:login' %}?next={% url 'posts:post_detail' post.id %}" class="post-title-link">
        {% else %}
        <a href="{% url 'posts:post_detail' post.id %}" class="post-title-link">
        {% endif %}
            <h3>{{ post.title }}</h3>
        </a>
        <p class="post-category">{{post.category.parent.name}}：{{ post.category }}</p>
    </div>

    <div class="post-stats">
        <span class="likes">
            <i class="far fa-thumbs-up"></i>
            <span>{{ post.help_count }}</span>
        </span>

        <span class="comments">
            <i class="far fa-comment-dots"></i>
            <span>{{ post.comment_count }}</span>
        </span>
        <form action="{% url 'posts:toggle_save' post.id %}" method="post">
            {% csrf_token %}
            <button type="submit" class="save-btn">
                {% if user in post.saved_users.all %}
                <i class="fas fa-bookmark"></i>
                {% else %}
                <i class="far fa-bookmark"></i>
                {% endif %}
            </button>
        </form>
    </div>
</div>
