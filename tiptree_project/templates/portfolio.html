<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    {% load static %}
    <link rel="stylesheet" type="text/css" href="{% static 'portfolio.css' %}">
    <title>Portfolio</title>
</head>
<body>
    <div class="container">
        <h1>作品No.1 TipTree</h1>

        <img src="{% static 'images/portfolio.jpeg' %}" alt="TipTreeホーム画面">

        <p>TipTreeは、「見る楽しさ」「共有する喜び」「学び合う価値」がそろったライフハック共有プラットフォームです。</p>
        <p>気になる投稿は保存して後から確認でき、コメントや補足説明を通じて知識を深め合えます。</P>
        <p>また、カテゴリー別に検索できたり、人気な投稿のランキングが表示される仕組みにより、</p>
        <p>実用的な情報を見つけやすく、より便利な暮らしを提供します。</p>
    </div>

    <div class="links">
        <a href="{% static "documents/TipTree.docx.pdf" %}">企画書</a>
        <a href="{% static "documents/画面設計図.pptx.pdf" %}">画面設計図</a>
        <a href="{% static "documents/画面遷移図.pdf" %}">画面遷移図</a>
        <a href="{% static "documents/ER図.pdf" %}">ER図</a>
    </div>

    <button onclick="location.href='{% url 'home:home' %}'">
        このアプリにアクセス
    </button>
</body>
</html>
